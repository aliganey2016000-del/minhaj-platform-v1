      rel="stylesheet"
    />

    <!-- Inline PWA Install Detection - minimal critical JS -->
    <script>
      (function() {
        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', function(e) {
          e.preventDefault();
          deferredPrompt = e;
          window.__pwaDeferredPrompt = deferredPrompt;
          window.dispatchEvent(new CustomEvent('pwa-install-ready', { detail: deferredPrompt }));
        });
        window.addEventListener('appinstalled', function() {
          window.__pwaInstalled = true;
          window.dispatchEvent(new CustomEvent('pwa-installed'));
        });
        if (window.matchMedia('(display-mode: standalone)').matches || navigator.standalone) {
          window.__pwaInstalled = true;
        }
      })();
    </script>

    <title>Sahal Education Platform | منصة سهل التعليمية</title>
  </head>
