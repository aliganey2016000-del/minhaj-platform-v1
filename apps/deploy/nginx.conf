# ───────────────────────────────────────────────────
#  Nginx Reverse Proxy Configuration
#  Masjid Al-Rahma Platform
# ───────────────────────────────────────────────────

server {
    listen 80;
    server_name _;  # Replace with your domain or keep _ for IP-only access

    # Frontend static files
    root /var/www/masjid-al-rahma/frontend/dist;
    index index.html;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/json application/xml+rss image/svg+xml;

    # Client max body size (for file uploads)
    client_max_body_size 10M;

    # ─────────────────────────────────────────────
    #  Frontend SPA — serve index.html for all routes
    # ─────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # Don't cache index.html
    location = /index.html {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Assets with cache
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # ─────────────────────────────────────────────
    #  API Proxy → Backend (PM2 on port 5000)
    # ─────────────────────────────────────────────
    location /api/ {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Increase timeout for long-running requests
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
    }
}